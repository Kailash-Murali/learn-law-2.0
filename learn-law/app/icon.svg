<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>

  <!-- Centre pole -->
  <line x1="16" y1="7" x2="16" y2="26" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="11" y1="26" x2="21" y2="26" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Crossbar -->
  <line x1="7" y1="12" x2="25" y2="12" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Left hanging chain -->
  <line x1="7"  y1="12" x2="7"  y2="18" stroke="#cccccc" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Right hanging chain -->
  <line x1="25" y1="12" x2="25" y2="18" stroke="#cccccc" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Left pan (arc) -->
  <path d="M 4 18 Q 7 23 10 18" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Right pan (arc) -->
  <path d="M 22 18 Q 25 23 28 18" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Centre pivot jewel -->
  <circle cx="16" cy="7" r="1.8" fill="#ffffff"/>
</svg>
